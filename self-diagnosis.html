// ============== 상태 관리 ==============
const STORAGE_KEY = "self-diagnosis-answers-v1";
const state = {
  stage: "intro", // intro | survey | result
  answers: {},    // { qid: [v1,v2,v3,v4] }
  showErrors: false,
};

function loadAnswers() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}
function saveAnswers(a) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(a)); } catch {}
}
function clearAnswers() {
  try { localStorage.removeItem(STORAGE_KEY); } catch {}
}

// ============== 채점 로직 ==============
function isAnswerValid(arr) {
  if (!arr || arr.length !== 4) return false;
  const s = [...arr].sort();
  return s[0] === 1 && s[1] === 2 && s[2] === 3 && s[3] === 4;
}
function isComplete(answers) {
  return QUESTIONS.every(q => isAnswerValid(answers[q.id]));
}
function calculateScores(answers) {
  const scores = { leader: 0, sensitive: 0, unique: 0, hermit: 0 };
  for (const q of QUESTIONS) {
    const ans = answers[q.id];
    if (!ans) continue;
    for (let i = 0; i < 4; i++) scores[q.mapping[i]] += ans[i];
  }
  const sortedTypes = Object.keys(scores).sort((a, b) => scores[b] - scores[a]);
  return { scores, topType: sortedTypes[0], sortedTypes };
}

// ============== 렌더링 ==============
const app = document.getElementById("app");
let prevStage = null;

function render() {
  const stageChanged = prevStage !== state.stage;
  const scrollY = window.scrollY;

  if (state.stage === "intro") renderIntro();
  else if (state.stage === "survey") renderSurvey();
  else renderResult();

  if (stageChanged) {
    window.scrollTo({ top: 0 });
  } else {
    window.scrollTo({ top: scrollY });
  }
  prevStage = state.stage;
}

function renderIntro() {
  const hasSaved = !!loadAnswers();
  app.innerHTML = `
    <div class="flex flex-col items-center gap-8 py-10 text-center">
      <div>
        <h1 class="text-4xl font-bold tracking-tight sm:text-5xl">자기진단 테스트</h1>
        <p class="mt-3 text-base text-zinc-600">20문항으로 알아보는 나의 성격 유형</p>
      </div>
      <div class="grid w-full grid-cols-2 gap-3 sm:grid-cols-4">
        ${Object.entries(TYPE_LABELS).map(([k, t]) => `
          <div class="rounded-xl border border-zinc-200 bg-white p-4">
            <div class="text-3xl" style="color: ${t.color}">${t.symbol}</div>
            <div class="mt-1 text-sm font-medium">${t.name}</div>
          </div>`).join("")}
      </div>
      <div class="rounded-xl bg-zinc-100 p-5 text-left text-sm leading-relaxed text-zinc-700 w-full">
        <p class="font-semibold">검사 방법</p>
        <p class="mt-2">각 문항마다 4개의 보기에 <b>중복 없이 1~4점</b>을 부여하세요.</p>
        <ul class="mt-2 list-disc pl-5">
          <li>4점 = 가장 잘 부합됨</li>
          <li>3점 = 대체로 부합됨</li>
          <li>2점 = 조금 부합됨</li>
          <li>1점 = 거의 부합되지 않음</li>
        </ul>
      </div>
      <div class="flex w-full flex-col gap-2 sm:flex-row sm:justify-center">
        <button id="btn-start-new" class="rounded-lg bg-zinc-900 px-6 py-3 font-medium text-white transition hover:bg-zinc-700">
          새로 시작하기
        </button>
        ${hasSaved ? `
        <button id="btn-resume" class="rounded-lg border border-zinc-300 px-6 py-3 font-medium transition hover:bg-zinc-50">
          이어서 하기
        </button>` : ""}
      </div>
    </div>
  `;
  document.getElementById("btn-start-new").onclick = () => {
    state.answers = {}; state.stage = "survey"; state.showErrors = false; render();
  };
  if (hasSaved) {
    document.getElementById("btn-resume").onclick = () => {
      state.answers = loadAnswers() || {}; state.stage = "survey"; state.showErrors = false; render();
    };
  }
}

function renderSurvey() {
  const completed = QUESTIONS.filter(q => isAnswerValid(state.answers[q.id])).length;
  const progress = (completed / QUESTIONS.length) * 100;

  const questionsHTML = QUESTIONS.map(q => {
    const ans = state.answers[q.id];
    const valid = isAnswerValid(ans);
    const hasError = state.showErrors && !valid;
    const used = new Set((ans || []).filter(v => v > 0));
    const borderClass = hasError
      ? "border-red-400 ring-2 ring-red-200"
      : valid ? "border-emerald-300" : "border-zinc-200";

    const optsHTML = q.options.map((opt, optIdx) => {
      const selected = ans?.[optIdx] || 0;
      const btns = [4, 3, 2, 1].map(val => {
        const isSel = selected === val;
        const isDis = !isSel && used.has(val);
        const cls = isSel
          ? "bg-zinc-900 text-white"
          : isDis
            ? "bg-zinc-200 text-zinc-400 cursor-not-allowed"
            : "bg-white text-zinc-700 hover:bg-zinc-100";
        return `<button type="button" data-q="${q.id}" data-opt="${optIdx}" data-val="${val}" ${isDis ? "disabled" : ""}
          class="h-9 w-9 rounded-md text-sm font-semibold transition score-btn ${cls}">${val}</button>`;
      }).join("");
      const marks = ["①","②","③","④"];
      const imgSrc = q.images?.[optIdx];
      const imgHTML = imgSrc
        ? `<img src="${imgSrc}" alt="${marks[optIdx]} 보기 이미지" class="mt-2 h-32 w-32 rounded-md border border-zinc-200 bg-white object-contain sm:h-36 sm:w-36">`
        : "";
      return `
        <div class="flex items-start gap-3 rounded-lg bg-zinc-50 p-3">
          <div class="flex shrink-0 gap-1">${btns}</div>
          <div class="flex flex-1 flex-col">
            <span class="pt-1.5 text-sm leading-relaxed text-zinc-700">
              <span class="mr-1 font-semibold">${marks[optIdx]}</span>${escapeHtml(opt)}
            </span>
            ${imgHTML}
          </div>
        </div>`;
    }).join("");

    return `
      <div id="q-${q.id}" class="rounded-xl border bg-white p-5 transition ${borderClass}">
        <div class="mb-4">
          <span class="inline-block rounded bg-zinc-100 px-2 py-0.5 text-xs font-medium">Q${q.id}</span>
          <p class="mt-2 font-medium leading-relaxed">${escapeHtml(q.text)}</p>
        </div>
        <div class="space-y-2">${optsHTML}</div>
        ${hasError ? '<p class="mt-3 text-sm text-red-600">⚠ 4개 보기에 각각 1·2·3·4점을 중복 없이 입력해주세요.</p>' : ""}
      </div>`;
  }).join("");

  app.innerHTML = `
    <div class="sticky top-0 z-10 -mx-4 mb-6 bg-[#fafafa]/95 px-4 py-3 backdrop-blur no-print">
      <div class="flex items-center justify-between text-sm">
        <span class="font-medium">진행도 ${completed} / ${QUESTIONS.length}</span>
        <span class="text-zinc-500">${Math.round(progress)}%</span>
      </div>
      <div class="mt-2 h-2 w-full overflow-hidden rounded-full bg-zinc-200">
        <div class="h-full bg-zinc-900 transition-all" style="width: ${progress}%"></div>
      </div>
    </div>
    <div class="space-y-6">${questionsHTML}</div>
    <div class="sticky bottom-0 -mx-4 mt-8 bg-[#fafafa]/95 px-4 py-4 backdrop-blur no-print">
      <button id="btn-submit" class="w-full rounded-lg bg-zinc-900 px-6 py-3.5 font-medium text-white transition hover:bg-zinc-700">
        결과 보기
      </button>
    </div>
  `;

  app.querySelectorAll(".score-btn").forEach(btn => {
    btn.onclick = () => {
      const qid = parseInt(btn.dataset.q);
      const optIdx = parseInt(btn.dataset.opt);
      const val = parseInt(btn.dataset.val);
      const cur = state.answers[qid] || [0, 0, 0, 0];
      cur[optIdx] = val;
      state.answers[qid] = cur;
      render();
    };
  });

  document.getElementById("btn-submit").onclick = () => {
    if (!isComplete(state.answers)) {
      state.showErrors = true;
      const firstBad = QUESTIONS.find(q => !isAnswerValid(state.answers[q.id]));
      render();
      if (firstBad) {
        setTimeout(() => {
          document.getElementById(`q-${firstBad.id}`)?.scrollIntoView({ behavior: "smooth", block: "center" });
        }, 50);
      }
      return;
    }
    saveAnswers(state.answers);
    state.stage = "result";
    render();
  };
}

function renderResult() {
  const r = calculateScores(state.answers);
  const topLabel = TYPE_LABELS[r.topType];
  const topDesc = TYPE_DESCRIPTIONS[r.topType];
  const total = Object.values(r.scores).reduce((a, b) => a + b, 0);
  const topPct = Math.round((r.scores[r.topType] / total) * 100);

  // 핵심 응답: 최고 유형에 3~4점 부여한 문항
  const contribs = QUESTIONS.map(q => {
    const ans = state.answers[q.id];
    if (!ans) return null;
    const idx = q.mapping.findIndex(t => t === r.topType);
    if (idx === -1) return null;
    const score = ans[idx];
    if (score < 3) return null;
    return { qid: q.id, text: q.text, optionText: q.options[idx], score };
  }).filter(Boolean).sort((a, b) => b.score - a.score).slice(0, 3);

  app.innerHTML = `
    <div class="space-y-8 py-4">
      <div class="text-center">
        <p class="text-sm text-zinc-500">당신의 성격 유형은</p>
        <div class="mt-3 flex items-center justify-center gap-3">
          <span class="text-5xl" style="color: ${topLabel.color}">${topLabel.symbol}</span>
          <h1 class="text-4xl font-bold">${topDesc.name}</h1>
        </div>
        <p class="mt-3 text-base text-zinc-600">${topDesc.tagline}</p>
        <p class="mt-2 text-sm text-zinc-500">전체 응답 중 <b>${topPct}%</b>가 이 유형 (${r.scores[r.topType]}점 / ${total}점)</p>
      </div>

      <div class="rounded-xl border border-zinc-200 bg-white p-6">
        <h2 class="text-xl font-bold">📊 유형별 점수</h2>
        <div class="mt-4" style="height: 260px;">
          <canvas id="score-chart"></canvas>
        </div>
        <div class="mt-4 grid grid-cols-2 gap-2 sm:grid-cols-4">
          ${r.sortedTypes.map((k, i) => {
            const l = TYPE_LABELS[k];
            return `
              <div class="rounded-lg p-3 ${i === 0 ? "bg-zinc-100" : "bg-zinc-50"}">
                <div class="flex items-center gap-1">
                  <span class="text-lg" style="color: ${l.color}">${l.symbol}</span>
                  <span class="text-sm font-medium">${l.name}</span>
                  ${i === 0 ? '<span class="ml-auto text-xs font-bold">1st</span>' : ""}
                </div>
                <div class="mt-1 text-xl font-bold">${r.scores[k]}점</div>
              </div>`;
          }).join("")}
        </div>
      </div>

      <div class="rounded-xl border border-zinc-200 bg-white p-6">
        <h2 class="text-xl font-bold">📝 유형 설명</h2>
        <p class="mt-3 leading-relaxed text-zinc-700">${topDesc.summary}</p>
        <div class="mt-5 grid gap-4 sm:grid-cols-2">
          <div class="rounded-lg bg-zinc-50 p-4">
            <h3 class="text-sm font-semibold">💪 강점</h3>
            <ul class="mt-2 space-y-1 text-sm text-zinc-700">${topDesc.strengths.map(s => `<li>• ${s}</li>`).join("")}</ul>
          </div>
          <div class="rounded-lg bg-zinc-50 p-4">
            <h3 class="text-sm font-semibold">⚠️ 약점</h3>
            <ul class="mt-2 space-y-1 text-sm text-zinc-700">${topDesc.weaknesses.map(s => `<li>• ${s}</li>`).join("")}</ul>
          </div>
        </div>
        <div class="mt-5 space-y-3">
          <div><h3 class="text-sm font-semibold">업무 스타일</h3><p class="mt-1 text-sm leading-relaxed text-zinc-700">${topDesc.workStyle}</p></div>
          <div><h3 class="text-sm font-semibold">대인 관계</h3><p class="mt-1 text-sm leading-relaxed text-zinc-700">${topDesc.socialStyle}</p></div>
          <div><h3 class="text-sm font-semibold">추천 역할/직업</h3><p class="mt-1 text-sm leading-relaxed text-zinc-700">${topDesc.recommendedRoles.join(", ")}</p></div>
        </div>
      </div>

      ${contribs.length > 0 ? `
      <div class="rounded-xl border border-zinc-200 bg-white p-6">
        <h2 class="text-xl font-bold">🔍 이 결과의 핵심 응답</h2>
        <p class="mt-2 text-sm text-zinc-500">${topDesc.name} 성향과 가장 잘 맞는 응답들이에요.</p>
        <ul class="mt-4 space-y-3">
          ${contribs.map(c => `
            <li class="rounded-lg bg-zinc-50 p-3">
              <div class="text-xs font-medium text-zinc-500">Q${c.qid} · ${c.score}점 부여</div>
              <div class="mt-1 text-sm font-medium">${escapeHtml(c.text)}</div>
              <div class="mt-1 text-sm text-zinc-600">→ ${escapeHtml(c.optionText)}</div>
            </li>`).join("")}
        </ul>
      </div>` : ""}

      <div class="flex flex-col gap-2 sm:flex-row no-print">
        <button id="btn-restart" class="flex-1 rounded-lg border border-zinc-300 px-6 py-3 font-medium transition hover:bg-zinc-50">
          다시 시작하기
        </button>
        <button id="btn-print" class="flex-1 rounded-lg bg-zinc-900 px-6 py-3 font-medium text-white transition hover:bg-zinc-700">
          결과 저장 (인쇄/PDF)
        </button>
      </div>
    </div>
  `;

  // 차트 렌더링
  const ctx = document.getElementById("score-chart");
  const labels = Object.keys(r.scores).map(k => `${TYPE_LABELS[k].symbol} ${TYPE_LABELS[k].name}`);
  const colors = Object.keys(r.scores).map(k => TYPE_LABELS[k].color);
  new Chart(ctx, {
    type: "bar",
    data: {
      labels,
      datasets: [{
        data: Object.values(r.scores),
        backgroundColor: colors,
        borderRadius: 6,
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: { y: { beginAtZero: true } },
    },
  });

  document.getElementById("btn-restart").onclick = () => {
    state.answers = {}; state.stage = "intro"; state.showErrors = false; clearAnswers(); render();
  };
  document.getElementById("btn-print").onclick = () => window.print();
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}

render();
</script>
</body>
</html>
